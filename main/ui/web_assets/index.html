<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Device Configuration</title><style>* { box-sizing: border-box; margin: 0; padding: 0; }body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f5f5f7; color: #1d1d1f; line-height: 1.5; padding: 20px; min-height: 100vh; }.container { max-width: 480px; margin: 0 auto; }.card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }.header { text-align: center; margin-bottom: 24px; }.header h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }.header p { color: #86868b; font-size: 14px; }.section-title { font-size: 14px; font-weight: 600; text-transform: uppercase; color: #86868b; margin-bottom: 16px; letter-spacing: 0.5px; }.form-group { margin-bottom: 20px; }label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #1d1d1f; }input[type="text"], input[type="password"], input[type="number"], select { width: 100%; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 16px; background: #fbfbfd; transition: border-color 0.2s, box-shadow 0.2s; }input:focus, select:focus { outline: none; border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0,113,227,0.15); }.toggle { position: relative; display: inline-block; width: 50px; height: 30px; }.toggle input { opacity: 0; width: 0; height: 0; }.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #d2d2d7; transition: .3s; border-radius: 30px; }.slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }input:checked + .slider { background-color: #34c759; }input:checked + .slider:before { transform: translateX(20px); }.btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }.btn-primary { background: #0071e3; color: white; }.btn-primary:hover { background: #0077ed; }.btn-primary:active { transform: scale(0.98); }.btn-success { background: #34c759; color: white; }.btn:disabled { opacity: 0.6; cursor: not-allowed; }.network-list { max-height: 200px; overflow-y: auto; }.network-item { display: flex; align-items: center; padding: 12px; border-radius: 10px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px; }.network-item:hover { background: #f5f5f7; }.network-item.selected { background: #0071e3; color: white; }.network-item.selected .network-secure { color: rgba(255, 255, 255, 0.8); }.network-icon { width: 24px; height: 24px; margin-right: 12px; }.network-info { flex: 1; }.network-name { font-weight: 500; }.network-secure { font-size: 12px; color: #86868b; }.hidden-form { display: none; }.message { padding: 16px; border-radius: 10px; margin-bottom: 16px; text-align: center; font-size: 14px; }.message.success { background: #d4edda; color: #155724; }.message.error { background: #f8d7da; color: #721c24; }.loading { text-align: center; padding: 40px; color: #86868b; }.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #0071e3; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style></head><body><div class="container"><div class="card"><div class="header"><h1>⚙️ Device Setup</h1><p>Configure your device to connect to your network</p></div><div id="message"></div><form id="configForm" method="POST" action="/settings"><div class="section-title">WiFi Network</div><div id="wifiSection"><div class="loading"><div class="spinner"></div>Scanning...</div></div><div class="form-group hidden-form" id="passwordGroup"><label for="password">Password</label><input type="password" id="password" name="password" placeholder="Enter WiFi password" /></div><div class="form-group hidden-form" id="hiddenSsidGroup"><label for="hidden_ssid">Hidden Network SSID</label><input type="text" id="hidden_ssid" name="hidden_ssid" placeholder="Enter network name" /></div><div class="form-group"><label><input type="checkbox" id="hiddenNetwork" onchange="toggleHiddenNetwork()" /> Connect to hidden network</label></div><input type="hidden" id="selected_ssid" name="ssid" /><div class="section-title">Device Configuration</div><div id="configFields"><div class="loading"><div class="spinner"></div>Loading...</div></div><button type="submit" class="btn btn-primary" id="submitBtn">Save & Connect</button></form></div></div><script>let selectedSsid = ""; let configSchema = null; fetch("/config").then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }).then(data => { configSchema = data; if (data.fields) renderConfigFields(data.fields); else throw new Error("Invalid response"); }).catch(e => { document.getElementById("configFields").innerHTML = "<div class='message error'>Failed to load config: " + escapeHtml(e.message) + "</div>"; console.error("Config fetch error:", e); }); fetch("/scan").then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }).then(data => { if (data.networks) renderNetworks(data.networks); else throw new Error("Invalid response"); }).catch(e => { document.getElementById("wifiSection").innerHTML = "<div class='message error'>Scan failed: " + escapeHtml(e.message) + "</div>"; console.error("Scan fetch error:", e); }); function renderNetworks(networks) { const container = document.getElementById("wifiSection"); if (!networks || networks.length === 0) { container.innerHTML = "<div class='message error'>No networks found</div>"; return; } let html = "<div class='network-list'>"; networks.forEach(n => { const secure = n.auth !== 0; html += "<div class='network-item' data-ssid=\"" + escapeAttr(n.ssid) + "\" data-secure=\"" + secure + "\" onclick='handleNetworkClick(this)'>"; html += "<div class='network-icon'>" + (secure ? "🔒" : "📡") + "</div>"; html += "<div class='network-info'><div class='network-name'>" + escapeHtml(n.ssid) + "</div>"; html += "<div class='network-secure'>" + (secure ? "Secure" : "Open") + " • " + n.rssi + "dBm</div></div>"; html += "</div>"; }); html += "</div>"; container.innerHTML = html; } function handleNetworkClick(el) { selectNetwork(el.dataset.ssid, el.dataset.secure === 'true', el); } function selectNetwork(ssid, secure, el) { selectedSsid = ssid; document.querySelectorAll('.network-item').forEach(e => e.classList.remove('selected')); if (el) el.classList.add('selected'); document.getElementById('selected_ssid').value = ssid; document.getElementById('hidden_ssid').value = ssid; document.getElementById('passwordGroup').classList.toggle('hidden-form', !secure); if (!secure) document.getElementById('password').value = ''; } function toggleHiddenNetwork() { const isHidden = document.getElementById('hiddenNetwork').checked; document.getElementById('wifiSection').classList.toggle('hidden-form', isHidden); document.getElementById('hiddenSsidGroup').classList.toggle('hidden-form', !isHidden); if (isHidden) document.getElementById('passwordGroup').classList.remove('hidden-form'); } function renderConfigFields(fields) { const container = document.getElementById('configFields'); let html = ''; fields.forEach(f => { html += "<div class='form-group'>"; html += "<label for='" + f.name + "'>" + escapeHtml(f.label) + "</label>"; if (f.type === 'string') { html += "<input type='text' id='" + f.name + "' name='" + f.name + "' value='" + escapeHtml(f.value || '') + "'>"; } else if (f.type === 'number') { html += "<input type='number' id='" + f.name + "' name='" + f.name + "' value='" + f.value + "' min='" + (f.min || 0) + "' max='" + (f.max || 999999) + "'>"; } else if (f.type === 'boolean') { html += "<label class='toggle'><input type='checkbox' id='" + f.name + "' name='" + f.name + "'" + (f.value ? " checked" : "") + "><span class='slider'></span></label>"; } html += "</div>"; }); container.innerHTML = html; document.getElementById('configForm').addEventListener('submit', function(e) { fields.forEach(f => { if (f.type === 'boolean') { const cb = document.getElementById(f.name); if (cb) { cb.type = 'hidden'; cb.value = cb.checked ? 'true' : 'false'; } } }); document.getElementById('submitBtn').disabled = true; document.getElementById('submitBtn').textContent = 'Connecting...'; }); } function escapeHtml(text) { if (!text) return ''; return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); } function escapeAttr(text) { if (!text) return ''; return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }</script></body></html>
